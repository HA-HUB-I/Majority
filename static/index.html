<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Majority Radio</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  :root {
    --bg:      #0d0d0d;
    --surface: #161616;
    --border:  #2a2a2a;
    --green:   #00e676;
    --dim:     #4a4a4a;
    --text:    #e0e0e0;
    --red:     #ff5252;
    --amber:   #ffd740;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  h1 {
    color: var(--green);
    letter-spacing: 4px;
    font-size: 18px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Connection */
  .connect-row {
    display: flex;
    gap: 6px;
  }
  .connect-row input {
    flex: 1;
    background: #111;
    border: 1px solid var(--border);
    color: var(--green);
    font-family: inherit;
    font-size: 14px;
    padding: 6px 10px;
    border-radius: 4px;
    outline: none;
  }
  .connect-row input:focus { border-color: var(--green); }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--dim);
    display: inline-block;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .dot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.err { background: var(--red); }
  #conn-status {
    display: flex;
    align-items: center;
    margin-top: 8px;
    font-size: 12px;
    color: var(--dim);
    min-height: 18px;
  }

  /* Now Playing */
  .now-playing-inner {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  #albumart {
    width: 64px;
    height: 64px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--border);
    border: 1px solid var(--border);
    flex-shrink: 0;
    display: none;
  }
  #albumart.visible { display: block; }
  .now-playing-text { flex: 1; min-width: 0; }
  #mode-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--amber);
    margin-bottom: 6px;
  }
  #station {
    font-size: 20px;
    color: var(--green);
    font-weight: bold;
    min-height: 28px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #track {
    font-size: 13px;
    color: var(--text);
    min-height: 20px;
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .meta-row {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-size: 11px;
    color: var(--dim);
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  button {
    background: #1e1e1e;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, color 0.1s;
    user-select: none;
  }
  button:hover  { background: #252525; border-color: #444; }
  button:active { background: #111; transform: scale(0.97); }
  button.accent {
    border-color: var(--green);
    color: var(--green);
  }
  button.accent:hover { background: #0a2a1a; }
  button.danger {
    border-color: var(--red);
    color: var(--red);
  }
  button.small { padding: 6px 10px; font-size: 12px; }
  button.wide  { flex: 1; }

  /* Volume bar */
  .vol-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #vol-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  #vol-bar {
    height: 100%;
    width: 0%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.3s;
  }
  #vol-num { font-size: 13px; color: var(--green); min-width: 28px; text-align: right; }

  /* Mode buttons */
  .mode-btn { flex: 1; text-align: center; font-size: 12px; letter-spacing: 1px; }
  .mode-btn.active {
    background: #0d2b1a;
    border-color: var(--green);
    color: var(--green);
  }

  /* Presets */
  .preset-btn { min-width: 44px; }

  /* Station browser */
  #browser-panel {
    display: none;
    margin-top: 10px;
  }
  .browser-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  #browser-path {
    flex: 1;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #station-list {
    max-height: 240px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .stn-item {
    display: flex;
    align-items: center;
    padding: 7px 10px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    transition: background 0.1s;
  }
  .stn-item:last-child { border-bottom: none; }
  .stn-item:hover { background: #1e1e1e; }
  .stn-item.playing { color: var(--green); }
  .stn-icon { font-size: 10px; color: var(--dim); flex-shrink: 0; }
  .stn-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .stn-play { font-size: 11px; color: var(--dim); flex-shrink: 0; }
  #browser-loading { text-align: center; padding: 20px; color: var(--dim); font-size: 12px; }

  /* Debug */
  #debug-toggle {
    background: none;
    border: none;
    color: var(--dim);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    letter-spacing: 1px;
  }
  #debug-toggle:hover { color: var(--text); }
  #debug-panel {
    display: none;
    margin-top: 10px;
    background: #111;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    font-size: 11px;
    color: #888;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
</style>
</head>
<body>

<h1>▶ Majority Radio</h1>

<!-- Connection -->
<div class="card">
  <div class="card-title">Connection</div>
  <div class="connect-row">
    <input type="text" id="ip-input" placeholder="192.168.1.x" autocomplete="off" spellcheck="false">
    <button class="accent" onclick="connect()">Connect</button>
    <button onclick="scan()" title="UDP broadcast scan (may not work on all networks)">Scan</button>
  </div>
  <div id="conn-status"><span class="dot" id="conn-dot"></span><span id="conn-text">Not connected</span></div>
</div>

<!-- Now Playing -->
<div class="card">
  <div class="card-title">Now Playing</div>
  <div class="now-playing-inner">
    <img id="albumart" src="" alt="Album Art" onerror="this.classList.remove('visible')">
    <div class="now-playing-text">
      <div id="mode-label">—</div>
      <div id="station">—</div>
      <div id="track">—</div>
      <div class="meta-row">
        <span id="bitrate">—</span>
        <span id="volume-label">Vol: —</span>
      </div>
    </div>
  </div>
</div>

<!-- Volume -->
<div class="card">
  <div class="card-title">Volume</div>
  <div class="vol-wrap" style="margin-bottom:10px">
    <div id="vol-bar-bg"><div id="vol-bar"></div></div>
    <span id="vol-num">—</span>
  </div>
  <div class="btn-row">
    <button class="wide" onclick="cmd('VolumeDown')">VOL −</button>
    <button class="wide danger" onclick="cmd('Mute')">MUTE</button>
    <button class="wide" onclick="cmd('VolumeUp')">VOL +</button>
  </div>
</div>

<!-- Transport -->
<div class="card">
  <div class="card-title">Playback</div>
  <div class="btn-row">
    <button class="wide" onclick="cmd('Previous')">⏮ PREV</button>
    <button class="wide accent" onclick="cmd('PlayPause')">⏯ PLAY/PAUSE</button>
    <button class="wide" onclick="cmd('Next')">NEXT ⏭</button>
  </div>
</div>

<!-- Source -->
<div class="card">
  <div class="card-title">Source</div>
  <div class="btn-row">
    <button class="mode-btn" id="mode-0" onclick="switchMode(0)" title="Internet Radio — navigates to station menu">INET</button>
    <button class="mode-btn" id="mode-1" onclick="switchMode(1)" title="Internet Radio (alt)">INET2</button>
    <button class="mode-btn" id="mode-2" onclick="switchMode(2)" title="FM — menu ID unknown on this firmware">FM</button>
    <button class="mode-btn" id="mode-3" onclick="switchMode(3)" title="DAB+ — menu ID unknown on this firmware">DAB</button>
    <button class="mode-btn" id="mode-4" onclick="switchMode(4)" title="Bluetooth — menu ID unknown on this firmware">BT</button>
    <button class="mode-btn" id="mode-5" onclick="switchMode(5)" title="AUX — menu ID unknown on this firmware">AUX</button>
  </div>
  <div id="source-note" style="margin-top:6px;font-size:11px;color:var(--dim);display:none"></div>
</div>

<!-- Station Browser -->
<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
    <div class="card-title" style="margin-bottom:0">Stations</div>
    <button class="small" onclick="toggleBrowser()">▶ Browse</button>
  </div>
  <div id="browser-panel">
    <div class="browser-nav">
      <button class="small" id="btn-back" onclick="browserBack()" style="display:none">← Back</button>
      <span id="browser-path">—</span>
      <button class="small" onclick="browserLoad()">↺ Refresh</button>
    </div>
    <div id="station-list">
      <div id="browser-loading">Press Refresh to load stations</div>
    </div>
  </div>
</div>

<!-- Presets -->
<div class="card">
  <div class="card-title">Presets</div>
  <div id="presets-row" class="btn-row">
    <button class="preset-btn" onclick="preset(1)">1</button>
    <button class="preset-btn" onclick="preset(2)">2</button>
    <button class="preset-btn" onclick="preset(3)">3</button>
    <button class="preset-btn" onclick="preset(4)">4</button>
    <button class="preset-btn" onclick="preset(5)">5</button>
    <button class="preset-btn" onclick="preset(6)">6</button>
    <button class="preset-btn" onclick="preset(7)">7</button>
    <button class="preset-btn" onclick="preset(8)">8</button>
  </div>
</div>

<!-- Debug -->
<div class="card">
  <button id="debug-toggle" onclick="toggleDebug()">▶ RAW DEBUG</button>
  <div id="debug-panel"></div>
</div>

<script>
  const socket = io();
  let debugOpen = false;
  let browserOpen = false;
  let maxVol = 20;

  // Browser navigation state
  let browserStack = [];   // [{id, title}, ...]
  let currentPlayingId = '';

  // ── Socket events ──────────────────────────────────────────────────────────
  socket.on('status', updateUI);
  socket.on('disconnected', () => setConnState(false, 'Connection lost'));

  // ── UI Update ──────────────────────────────────────────────────────────────
  function updateUI(s) {
    // Station name — from cur_play_name (injected) or legacy field names
    setText('station', s.cur_play_name || s.StationName || s.station_name || s.Name || '—');

    // Playback status
    const playStatus = (s.status || s.SongTitle || s.song_title || s.Track || '').trim();
    setText('track', playStatus || '—');

    // Mode label
    const modeNum = s.Mode !== undefined ? String(s.Mode) : (s.mode !== undefined ? String(s.mode) : '');
    if (modeNum !== '') {
      setText('mode-label', modeLabel(modeNum));
    } else {
      const streamFmt = s.stream_format || '';
      setText('mode-label', streamFmt ? 'INTERNET RADIO' : (s.cur_play_name ? 'INTERNET RADIO' : '—'));
    }

    // Bitrate
    setText('bitrate', s.stream_format || (s.Bitrate ? s.Bitrate + ' kbps' : '—'));

    // Volume
    const volRaw = s.vol !== undefined ? s.vol : (s.Volume !== undefined ? s.Volume : s.volume);
    const vol = parseInt(volRaw, 10);
    if (!isNaN(vol)) {
      setText('vol-num', vol);
      setText('volume-label', 'Vol: ' + vol);
      document.getElementById('vol-bar').style.width = Math.min(100, (vol / maxVol) * 100) + '%';
    } else {
      setText('vol-num', '—');
      setText('volume-label', 'Vol: —');
    }

    // Mute indicator
    const isMuted = s.mute === '1' || s.mute === 1;
    const muteBtn = document.querySelector('button.danger');
    if (muteBtn) {
      muteBtn.style.opacity = isMuted ? '1' : '0.6';
      muteBtn.style.borderColor = isMuted ? 'var(--red)' : '';
    }

    // Highlight active mode button
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    if (modeNum !== '') {
      const activeBtn = document.getElementById('mode-' + modeNum);
      if (activeBtn) activeBtn.classList.add('active');
    }

    if (s._raw) log('STATUS:\n' + prettyXml(s._raw));
  }

  function modeLabel(m) {
    const map = { '0': 'INTERNET RADIO', '1': 'INTERNET RADIO', '2': 'FM', '3': 'DAB+', '4': 'BLUETOOTH', '5': 'AUX' };
    return map[String(m)] || (m ? 'MODE ' + m : '—');
  }

  // ── API Calls ──────────────────────────────────────────────────────────────
  async function connect() {
    const ip = document.getElementById('ip-input').value.trim();
    if (!ip) return;
    setConnState(false, 'Connecting…');
    try {
      const r = await post('/api/connect', { ip });
      if (r.ok) {
        setConnState(true, 'Connected to ' + ip);
        if (r.status && Object.keys(r.status).length) updateUI(r.status);
        loadHotkeys();
        startArtRefresh();
      } else {
        setConnState(false, r.error || 'Failed');
      }
    } catch(e) { setConnState(false, 'Error: ' + e.message); }
  }

  async function loadHotkeys() {
    try {
      const r = await fetch('/api/hotkeys');
      const hotkeys = await r.json();
      const row = document.getElementById('presets-row');
      if (!hotkeys || !hotkeys.length) return;
      row.innerHTML = '';
      hotkeys.forEach((hk, i) => {
        const btn = document.createElement('button');
        btn.className = 'preset-btn';
        btn.title = hk.name;
        btn.textContent = hk.name ? hk.name.substring(0, 8) : (i + 1);
        btn.onclick = () => preset(i + 1);
        row.appendChild(btn);
      });
    } catch(e) { log('Hotkeys load error: ' + e.message); }
  }

  async function scan() {
    log('Scanning via UDP…');
    try {
      const r = await post('/api/scan', {});
      if (r.found && r.found.length) {
        log('Found: ' + r.found.join(', '));
        document.getElementById('ip-input').value = r.found[0];
      } else {
        log('No devices found via UDP (network may block broadcast)');
      }
    } catch(e) { log('Scan error: ' + e.message); }
  }

  async function cmd(command, extras = {}) {
    try {
      const r = await post('/api/command', { command, ...extras });
      if (r.raw) log('CMD ' + command + ' → ' + prettyXml(r.raw));
      else if (r.note) log('CMD ' + command + ' → ' + r.note);
      else if (r.error) log('ERROR: ' + r.error);
    } catch(e) { log('Error: ' + e.message); }
  }

  async function switchMode(n) {
    const noteEl = document.getElementById('source-note');
    noteEl.style.display = 'none';
    try {
      const r = await post('/api/command', { command: 'SwitchMode', Mode: n });
      if (r.ok) {
        if (r.note) {
          noteEl.textContent = r.note;
          noteEl.style.display = 'block';
        }
        if (r.raw) log('SwitchMode → ' + prettyXml(r.raw));
      } else {
        const msg = r.error || r.hint || 'Source switching not supported on this firmware';
        noteEl.textContent = msg;
        noteEl.style.display = 'block';
        log('SwitchMode mode=' + n + ': ' + msg);
      }
    } catch(e) { log('Error: ' + e.message); }
  }

  function preset(n) { cmd('PlayFavorite', { Index: n }); }

  // ── Album Art ──────────────────────────────────────────────────────────────
  let lastArtHash = null;
  let artRefreshTimer = null;

  function refreshAlbumArt() {
    const img = document.getElementById('albumart');
    const url = '/api/albumart?t=' + Date.now(); // cache-bust
    const tmp = new Image();
    tmp.onload = () => {
      img.src = url;
      img.classList.add('visible');
    };
    tmp.onerror = () => {
      img.classList.remove('visible');
    };
    tmp.src = url;
  }

  function startArtRefresh() {
    if (artRefreshTimer) clearInterval(artRefreshTimer);
    refreshAlbumArt();
    artRefreshTimer = setInterval(refreshAlbumArt, 5000);
  }

  function stopArtRefresh() {
    if (artRefreshTimer) { clearInterval(artRefreshTimer); artRefreshTimer = null; }
    const img = document.getElementById('albumart');
    img.classList.remove('visible');
  }

  // ── Station Browser ────────────────────────────────────────────────────────
  function toggleBrowser() {
    browserOpen = !browserOpen;
    const panel = document.getElementById('browser-panel');
    panel.style.display = browserOpen ? 'block' : 'none';
    document.querySelector('[onclick="toggleBrowser()"]').textContent = (browserOpen ? '▼' : '▶') + ' Browse';
    if (browserOpen && document.getElementById('browser-loading').textContent === 'Press Refresh to load stations') {
      browserLoad();
    }
  }

  async function browserLoad(id) {
    const listEl = document.getElementById('station-list');
    listEl.innerHTML = '<div id="browser-loading">Loading…</div>';
    try {
      const url = id ? `/api/browse?id=${encodeURIComponent(id)}` : '/api/browse';
      const r = await fetch(url);
      const data = await r.json();
      if (data.error) { listEl.innerHTML = `<div id="browser-loading">Error: ${data.error}</div>`; return; }
      renderBrowserItems(data);
      updateBrowserNav(data.id, data.total);
    } catch(e) {
      listEl.innerHTML = `<div id="browser-loading">Error: ${e.message}</div>`;
    }
  }

  async function browserNavigate(id, name) {
    const listEl = document.getElementById('station-list');
    listEl.innerHTML = '<div id="browser-loading">Loading…</div>';
    try {
      const r = await post('/api/navigate', { id });
      const data = await r.json();
      if (data.error) { listEl.innerHTML = `<div id="browser-loading">Error: ${data.error}</div>`; return; }
      browserStack.push({ id, title: name });
      renderBrowserItems(data);
      updateBrowserNav(data.id, data.total);
    } catch(e) {
      listEl.innerHTML = `<div id="browser-loading">Error: ${e.message}</div>`;
    }
  }

  async function browserBack() {
    if (browserStack.length === 0) { browserLoad(); return; }
    browserStack.pop();
    const prev = browserStack.length ? browserStack[browserStack.length - 1] : null;
    if (prev) {
      browserStack.pop(); // will be re-pushed by browserNavigate
      await browserNavigate(prev.id, prev.title);
    } else {
      await browserLoad();
    }
  }

  function renderBrowserItems(data) {
    const listEl = document.getElementById('station-list');
    if (!data.items || !data.items.length) {
      listEl.innerHTML = '<div id="browser-loading">No items found</div>';
      return;
    }
    listEl.innerHTML = '';
    data.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'stn-item' + (item.id === currentPlayingId ? ' playing' : '');
      const isDir = item.type === 'dir';
      div.innerHTML = `
        <span class="stn-icon">${isDir ? '📁' : '🎵'}</span>
        <span class="stn-name" title="${escHtml(item.name)}">${escHtml(item.name) || item.id}</span>
        <span class="stn-play">${isDir ? '›' : '▶'}</span>
      `;
      div.onclick = () => {
        if (isDir) {
          browserNavigate(item.id, item.name);
        } else {
          playStation(item.id, item.name, div);
        }
      };
      listEl.appendChild(div);
    });
  }

  function updateBrowserNav(id, total) {
    document.getElementById('browser-path').textContent =
      (browserStack.length ? browserStack.map(s => s.title).join(' › ') + ' › ' : '') +
      'id=' + id + (total ? ' (' + total + ' items)' : '');
    document.getElementById('btn-back').style.display = browserStack.length ? 'inline-block' : 'none';
  }

  async function playStation(id, name, el) {
    currentPlayingId = id;
    document.querySelectorAll('.stn-item').forEach(d => d.classList.remove('playing'));
    if (el) el.classList.add('playing');
    try {
      const r = await post('/api/command', { command: 'PlayStation', id, name });
      if (r.error) log('ERROR: ' + r.error);
      else {
        log('Playing: ' + name + ' (' + id + ')');
        setTimeout(refreshAlbumArt, 2000); // art changes after a few seconds
      }
    } catch(e) { log('Error: ' + e.message); }
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  async function post(url, body) {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return r.json();
  }

  function setConnState(connected, text) {
    document.getElementById('conn-dot').className = 'dot' + (connected ? ' on' : ' err');
    document.getElementById('conn-text').textContent = text;
    if (!connected) {
      ['station','track','mode-label','bitrate','vol-num','volume-label']
        .forEach(id => setText(id, '—'));
      document.getElementById('vol-bar').style.width = '0%';
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      stopArtRefresh();
    }
  }

  function setText(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function prettyXml(xml) {
    return xml.replace(/></g, '>\n<').replace(/^\s+|\s+$/g, '');
  }

  function log(msg) {
    const p = document.getElementById('debug-panel');
    p.textContent += '\n' + msg;
    p.scrollTop = p.scrollHeight;
  }

  function toggleDebug() {
    debugOpen = !debugOpen;
    document.getElementById('debug-panel').style.display = debugOpen ? 'block' : 'none';
    document.getElementById('debug-toggle').textContent = (debugOpen ? '▼' : '▶') + ' RAW DEBUG';
  }

  // ── Enter key on IP input ──────────────────────────────────────────────────
  document.getElementById('ip-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') connect();
  });
</script>
</body>
</html>
